document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    // Nested page bundles (iframe targets). Each ships ONCE, in the ROOT
    // document's manifest; frame srcs carry an about:blank#<uuid> marker
    // instead of a substitutable uuid. Every document mints the blobs for
    // its OWN frames — from local text at the root, or text obtained from
    // its DIRECT parent over the relay protocol below — so each frame
    // navigation stays same-origin with its initiator and a deduped page
    // loads at any depth on any host, including a file:// download's
    // opaque origins (where a blob minted by one document cannot be
    // navigated to by another).
    const pageOrderEl = document.querySelector('script[type="__bundler/page_order"]');
    const pageOrder = pageOrderEl ? JSON.parse(pageOrderEl.textContent) : [];
    const pageSet = new Set(pageOrder);
    const pageTexts = {};

    // ── Nested-page text protocol (parent-chain relay) ──
    // Page bundles ship once, in the ROOT document's manifest. Every
    // document mints the blobs for its OWN frames, obtaining page text
    // through a strict parent-chain relay: a document only ever SENDS to
    // its direct parent (which, for every document the publisher's own
    // runtime minted, is another publisher document) and only ACCEPTS
    // text from that direct parent; requests from below are honored only
    // for the document's own child frames, and the ROOT never sends
    // upward at all. That last rule is load-bearing: the artifact host's
    // frame-ancestors allows claude.ai (and friends) to frame an
    // artifact, so window.top can be a FOREIGN document — a top-addressed
    // protocol would hand page uuids to that ancestor and accept forged
    // "page text" from it, minting attacker HTML as an artifact-origin
    // blob document. The chain never touches the ancestor: requests stop
    // at the root, replies are origin-addressed per hop (never '*' when
    // an origin exists), and both directions are origin-gated (on https
    // a foreign sender's origin can never equal this document's; in
    // opaque contexts — file:// — everything serializes as 'null', where
    // an embedded EXTERNAL frame still fails the gate by carrying its
    // own real origin, and a sandboxed child of such a frame is excluded
    // by the own-child-frames check plus uuid unguessability). Shape is
    // deny-by-default: one request form, one reply form, no error
    // replies.
    // window.origin is the SERIALIZED SECURITY origin ('null' in opaque
    // contexts such as a sandboxed preview iframe) — location.origin is
    // computed from the URL and stays 'https://…' even when the document
    // is sandboxed, which would misgate every opaque chain.
    const OWN_TARGET = /^https?:[/][/]/.test(window.origin || '')
      ? window.origin
      : '*';
    function trustedOrigin(e) {
      if (e.origin === window.origin) return true; // https chains; opaque==opaque
      // file:// trees: Chrome serializes the file document's origin as
      // 'file://' while the blob: documents it mints serialize as 'null',
      // so the two legitimate shapes can never string-match — accept the
      // pair in both directions. https origins never serialize as either,
      // and sender identity (own child frame / direct parent) is checked
      // separately.
      return (
        (e.origin === 'null' &&
          (window.origin === 'file://' ||
            window.location.protocol === 'file:')) ||
        (/^file:/.test(e.origin) && window.origin === 'null')
      );
    }
    // Non-empty only in the root document (nested bundles ship an empty
    // island), so it doubles as the root marker: the root answers from
    // local text and treats a miss as authoritative — never relaying to
    // its (possibly foreign) parent.
    const isPageRoot = pageOrder.length > 0;
    const blobUrls = {};
    const resourceBlobs = {};
    const UUID_SHAPE = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/;
    const pendingFrames = {}; // uuid -> [{el, frag}] awaiting text for own frames
    const pendingRelays = {}; // uuid -> [childWindow] awaiting text to pass down
    function mountPage(el, frag, text) {
      const pageBlob = new Blob([text], { type: 'text/html' });
      const u = URL.createObjectURL(pageBlob);
      resourceBlobs[u] = pageBlob;
      el.src = u + frag;
    }
    function deliverPage(uuid, text) {
      const frames = pendingFrames[uuid];
      delete pendingFrames[uuid];
      if (frames) for (const f of frames) mountPage(f.el, f.frag, text);
      const relays = pendingRelays[uuid];
      delete pendingRelays[uuid];
      if (relays) {
        for (const cw of relays) {
          try { cw.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
        }
      }
    }
    function ownFrameWindows() {
      const out = [];
      for (const f of Array.from(document.querySelectorAll('iframe'))) {
        try { if (f.contentWindow) out.push(f.contentWindow); } catch (err) { /* detached */ }
      }
      return out;
    }
    window.addEventListener('message', function (e) {
      const d = e.data;
      if (!d || typeof d !== 'object' || !e.source) return;
      // Origin gate first; the structural checks below (own-child-frames
      // for requests, direct-parent + solicited-uuid for replies, the
      // root's never-relay rule) are what hold in fully opaque chains
      // where origin strings can't discriminate — a sandboxed root's
      // FOREIGN wrapper still fails all three even though both serialize
      // as real-vs-'null' rather than matching.
      if (!trustedOrigin(e)) return;
      if (typeof d.__bundler_need === 'string' && UUID_SHAPE.test(d.__bundler_need)) {
        // Requests are honored only for this document's own child frames.
        if (ownFrameWindows().indexOf(e.source) < 0) return;
        const uuid = d.__bundler_need;
        const text = pageTexts[uuid];
        if (typeof text === 'string') {
          try { e.source.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
          return;
        }
        if (isPageRoot || window.parent === window) return; // authoritative miss
        const waiting = pendingRelays[uuid];
        if (waiting) {
          if (waiting.indexOf(e.source) < 0) waiting.push(e.source);
          return;
        }
        // Never-answered uuids would otherwise accumulate forever under a
        // request spray; past the cap (far above any real page count) new
        // relays are dropped rather than remembered.
        if (Object.keys(pendingRelays).length >= 128) return;
        pendingRelays[uuid] = [e.source];
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      } else if (
        typeof d.__bundler_page === 'string' &&
        UUID_SHAPE.test(d.__bundler_page) &&
        typeof d.__bundler_text === 'string'
      ) {
        // The shape test is load-bearing beyond tidiness: the solicited
        // check below uses the in operator, which matches prototype keys
        // ('__proto__', 'constructor') — an unshaped key would reach
        // deliverPage and throw, painting the error banner.
        // Text is accepted only from the direct parent — the document
        // that minted this one.
        if (e.source !== window.parent || window.parent === window) return;
        if (!(d.__bundler_page in pendingFrames) && !(d.__bundler_page in pendingRelays)) return;
        deliverPage(d.__bundler_page, d.__bundler_text);
      }
    });

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (pageSet.has(uuid)) {
          pageTexts[uuid] = new TextDecoder().decode(finalBytes);
          return;
        }
        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    // Page uuids have no blob here — they ride inside about:blank#<uuid>
    // frame markers the pass below resolves after the swap.
    for (const uuid of uuids) {
      if (pageSet.has(uuid)) continue;
      template = template.split(uuid).join(blobUrls[uuid]);
    }

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);

    // Resolve page-frame markers: mint this document's own blob for each
    // framed page — from local text when this is the root, otherwise by
    // asking the direct parent over the relay protocol above. An
    // unanswered request leaves the frame on about:blank, the same
    // degraded state as a refused embed.
    {
      const MARKER = /^about:blank#([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})(#.*)?$/;
      const needed = [];
      for (const el of Array.from(document.querySelectorAll('iframe'))) {
        const m = MARKER.exec(el.getAttribute('src') || '');
        if (!m) continue;
        const text = pageTexts[m[1]];
        if (typeof text === 'string') {
          mountPage(el, m[2] || '', text);
        } else if (window.parent !== window && !isPageRoot) {
          const had = pendingFrames[m[1]];
          (pendingFrames[m[1]] = had || []).push({ el: el, frag: m[2] || '' });
          if (!had) needed.push(m[1]);
        }
      }
      for (const uuid of needed) {
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      }
    }

    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

iv>\n    <\u002Fsc-if>\n\n    <!-- NOTE EDITOR VIEW -->\n    <sc-if value=\"{{ isNoteEditor }}\">\n      <div style=\"display:flex;align-items:center;gap:10px;padding:12px 20px 10px;border-bottom:1px solid #5A4A1A;\">\n        <button style=\"background:#1E1A0C;border:1px solid #5A4A1A;color:#D4A830;width:32px;height:32px;border-radius:50%;font-size:1rem;cursor:pointer;\" onclick=\"{{ closeNoteEditor }}\">‹<\u002Fbutton>\n        <div style=\"font-size:0.7rem;color:#D4A830;\">{{ editingNoteDate }}<\u002Fdiv>\n        <div style=\"flex:1;\"><\u002Fdiv>\n        <div style=\"{{ editingPinStyle }}\" onclick=\"{{ toggleEditingPin }}\"><svg sc-camel-view-box=\"0 0 24 24\" width=\"15\" height=\"15\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><line x1=\"12\" y1=\"17\" x2=\"12\" y2=\"22\"><\u002Fline><path d=\"M5 17h14l-1.4-4.6A2 2 0 0016 11V5a1 1 0 011-1 1 1 0 000-2H7a1 1 0 000 2 1 1 0 011 1v6a2 2 0 00-1.6 1.4z\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n        <span style=\"font-size:0.8rem;color:#A07828;cursor:pointer;\" onclick=\"{{ deleteNote }}\">Delete<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"padding:8px 20px 0;\">\n        <sc-raw-select value=\"{{ editingNoteFolder }}\" onchange=\"{{ onNoteFolderChange }}\" style=\"background:#1E1A0C;border:1px solid #5A4A1A;color:#D4A830;font-size:0.72rem;padding:5px 10px;border-radius:20px;outline:none;\">\n          <sc-for list=\"{{ folderOptions }}\" as=\"fo\" hint-placeholder-count=\"2\">\n            <option value=\"{{ fo.value }}\">{{ fo.label }}<\u002Foption>\n          <\u002Fsc-for>\n        <\u002Fsc-raw-select>\n      <\u002Fdiv>\n      <div style=\"padding:14px 20px 18px;\">\n        <input type=\"text\" placeholder=\"Title\" value=\"{{ editingNoteTitle }}\" oninput=\"{{ onNoteTitleChange }}\" onkeydown=\"{{ onNoteTitleKeyDown }}\" style=\"width:100%;border:none;background:transparent;outline:none;font-family:'Playfair Display',serif;font-size:1.4rem;font-weight:700;color:#FFFFFF;margin-bottom:10px;\">\n        <textarea ref=\"{{ noteBodyRef }}\" placeholder=\"Start writing…\" value=\"{{ editingNoteBody }}\" oninput=\"{{ onNoteBodyChange }}\" onkeydown=\"{{ onNoteBodyKeyDown }}\" style=\"width:100%;border:none;background:transparent;outline:none;font-size:1.15rem;color:#FFFFFF;line-height:2;resize:none;min-height:300px;\"><\u002Ftextarea>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- TODO VIEW -->\n    <sc-if value=\"{{ isTodo }}\">\n      <div style=\"padding:22px 20px 6px;\"><div style=\"font-family:'Playfair Display',serif;font-size:1.75rem;font-weight:700;letter-spacing:-0.02em;\">To Do<\u002Fdiv><div style=\"font-size:0.78rem;color:#D4A830;margin-top:4px;\">Things I need to do<\u002Fdiv><\u002Fdiv>\n      <div style=\"padding:10px 20px 8px;display:flex;justify-content:flex-end;\">\n        <button style=\"background:transparent;border:1px solid #5A4A1A;border-radius:20px;font-size:0.72rem;color:#D4A830;cursor:pointer;padding:5px 14px;\" onclick=\"{{ clearTodoDone }}\">Clear completed<\u002Fbutton>\n      <\u002Fdiv>\n      <dc-import name=\"ChecklistItems\" items=\"{{ todoRows }}\" newval=\"{{ todoNewVal }}\" onnewinput=\"{{ onTodoNewInput }}\" onnewenter=\"{{ onTodoNewEnter }}\" hint-size=\"100%,240px\"><\u002Fdc-import>\n    <\u002Fsc-if>\n\n    <!-- BUY VIEW -->\n    <sc-if value=\"{{ isBuy }}\">\n      <div style=\"padding:22px 20px 6px;\"><div style=\"font-family:'Playfair Display',serif;font-size:1.75rem;font-weight:700;letter-spacing:-0.02em;\">To Buy<\u002Fdiv><div style=\"font-size:0.78rem;color:#D4A830;margin-top:4px;\">My shopping list<\u002Fdiv><\u002Fdiv>\n      <div style=\"padding:10px 20px 8px;display:flex;justify-content:flex-end;\">\n        <button style=\"background:transparent;border:1px solid #5A4A1A;border-radius:20px;font-size:0.72rem;color:#D4A830;cursor:pointer;padding:5px 14px;\" onclick=\"{{ clearBuyDone }}\">Clear completed<\u002Fbutton>\n      <\u002Fdiv>\n      <dc-import name=\"ChecklistItems\" items=\"{{ buyRows }}\" newval=\"{{ buyNewVal }}\" onnewinput=\"{{ onBuyNewInput }}\" onnewenter=\"{{ onBuyNewEnter }}\" hint-size=\"100%,240px\"><\u002Fdc-import>\n    <\u002Fsc-if>\n\n  <\u002Fdiv>\n\n  <!-- BOTTOM NAV -->\n  <div style=\"position:fixed;bottom:0;left:0;right:0;max-width:480px;margin:0 auto;z-index:100;display:flex;background:#110E06;border-top:1px solid #5A4A1A;padding:6px 12px calc(8px + env(safe-area-inset-bottom, 0px));gap:6px;\">\n    <button style=\"{{ botTabNotesStyle }}\" onclick=\"{{ goBot_notes }}\">Notes<\u002Fbutton>\n    <button style=\"{{ botTabTodoStyle }}\" onclick=\"{{ goBot_todo }}\">To Do<\u002Fbutton>\n    <button style=\"{{ botTabBuyStyle }}\" onclick=\"{{ goBot_buy }}\">To Buy<\u002Fbutton>\n  <\u002Fdiv>\n\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nconst DAY_NAMES=[\"Sunday\",\"Monday\",\"Tuesday\",\"Wednesday\",\"Thursday\",\"Friday\",\"Saturday\"];\nconst MONTH_NAMES=[\"January\",\"February\",\"March\",\"April\",\"May\",\"June\",\"July\",\"August\",\"September\",\"October\",\"November\",\"December\"];\nconst LSKEY='pln26_data_v4';\nconst OLD_LSKEY='pln26_data_v3';\nconst OLD_YEAR=2026; // year that old single-year data was implicitly stored under\n\nfunction ymKey(y,m){ return y+'-'+m; }\nfunction parseYm(key){ const parts=key.split('-'); return { y: parseInt(parts[0]), m: parseInt(parts[1]) }; }\n\nfunction defaultData(){\n  return { tasks:{}, done:{}, dnotes:{}, habits:[], habitDone:{}, notes:{}, folders:[], todo:[], todone:{}, buy:[], bdone:{}, occasions:[] };\n}\nfunction migrateMonthKeyed(obj){\n  // old data was keyed by bare month index \"0\"..\"11\" for OLD_YEAR; remap to \"YEAR-M\"\n  const out = {};\n  Object.keys(obj||{}).forEach(k=>{\n    if(/^\\d+$/.test(k)) out[ymKey(OLD_YEAR, parseInt(k))] = obj[k];\n    else out[k] = obj[k];\n  });\n  return out;\n}\nfunction loadData(){\n  try{\n    const r = localStorage.getItem(LSKEY);\n    if(r) return Object.assign(defaultData(), JSON.parse(r));\n    const old = localStorage.getItem(OLD_LSKEY);\n    if(old){\n      const od = JSON.parse(old);\n      const migrated = Object.assign(defaultData(), od, {\n        tasks: migrateMonthKeyed(od.tasks), done: migrateMonthKeyed(od.done),\n        dnotes: migrateMonthKeyed(od.dnotes), habitDone: migrateMonthKeyed(od.habitDone),\n        notes: migrateMonthKeyed(od.notes)\n      });\n      saveData(migrated);\n      return migrated;\n    }\n  }catch(e){}\n  return defaultData();\n}\nfunction saveData(d){ try{ localStorage.setItem(LSKEY, JSON.stringify(d)); }catch(e){} }\n\nfunction dIM(y,m){ return new Date(y, m+1, 0).getDate(); }\nfunction getDow(y,m,d){ return new Date(y,m,d).getDay(); }\n\nclass Component extends DCLogic {\n  constructor(props){\n    super(props);\n    this.noteBodyRef = React.createRef();\n    this.refreshToday();\n    const now = new Date(this.todayY, this.todayM, this.todayD);\n    this.state = {\n      data: loadData(),\n      view: 'today',\n      todayDTab: 'tasks',\n      dayDTab: 'tasks',\n      viewYear: this.todayY, viewMonth: this.todayM, viewDay: this.todayD,\n      curYear: this.todayY, curMonth: this.todayM,\n      weekOff: 0,\n      openYear: null, openMonth: null, openDay: null,\n      prevView: 'today',\n      notesScreen: 'folders',\n      currentFolder: null,\n      expandedMonths: {},\n      editingNote: null,\n      notesSearch: '',\n      newOccName: '', newOccType: 'birthday', occAddTarget: null\n    };\n  }\n\n  mutate(fn){\n    const d = (typeof structuredClone==='function') ? structuredClone(this.state.data) : JSON.parse(JSON.stringify(this.state.data));\n    fn(d);\n    saveData(d);\n    this.setState({ data: d });\n  }\n\n  refreshToday(){\n    const now = new Date();\n    this.todayY = now.getFullYear();\n    this.todayM = now.getMonth();\n    this.todayD = now.getDate();\n  }\n  componentDidMount(){\n    this._todayInterval = setInterval(()=>{\n      const before = this.todayY+'-'+this.todayM+'-'+this.todayD;\n      this.refreshToday();\n      if(before !== this.todayY+'-'+this.todayM+'-'+this.todayD) this.forceUpdate();\n    }, 60000);\n    document.addEventListener('visibilitychange', this.handleVisibility = ()=>{\n      if(document.visibilityState==='visible'){ this.refreshToday(); this.forceUpdate(); }\n    });\n  }\n  componentWillUnmount(){\n    if(this._todayInterval) clearInterval(this._todayInterval);\n    if(this.handleVisibility) document.removeEventListener('visibilitychange', this.handleVisibility);\n  }\n  isToday(y,m,d){ return this.todayY===y && this.todayM===m && this.todayD===d; }\n\n  fmtHeaderDate(){\n    const now=new Date();\n    return DAY_NAMES[now.getDay()]+', '+MONTH_NAMES[this.todayM]+' '+this.todayD;\n  }\n  jumpToday(){\n    this.setState({ view:'today', viewYear:this.todayY, viewMonth:this.todayM, viewDay:this.todayD });\n  }\n\n  // ---- top nav ----\n  goTopToday(){ this.setState({ view:'today' }); }\n  goTopMonth(){ this.setState({ view:'month', curMonth: this.state.viewMonth, curYear: this.state.viewYear }); }\n  goTopWeek(){ this.setState({ view:'week' }); }\n  goBotNotes(){ this.setState({ view:'notes', notesScreen:'folders', currentFolder:null, editingNote:null, notesSearch:'' }); }\n  openFolder(key){ this.setState({ currentFolder:key, notesScreen:'list', editingNote:null, notesSearch:'', expandedMonths:{ [ymKey(this.todayY,this.todayM)]: true } }); }\n  backToFolders(){ this.setState({ notesScreen:'folders', editingNote:null, notesSearch:'' }); }\n  addFolder(name){ this.mutate(data=>{ if(!data.folders) data.folders=[]; data.folders.push(name); }); }\n  deleteFolder(idx){\n    this.mutate(data=>{\n      data.folders.splice(idx,1);\n      Object.keys(data.notes).forEach(key=>{\n        (data.notes[key]||[]).forEach(note=>{\n          if(note.folder===idx) note.folder=null;\n          else if(typeof note.folder==='number' && note.folder>idx) note.folder=note.folder-1;\n        });\n      });\n    });\n    if(this.state.currentFolder===idx) this.setState({ currentFolder:null, notesScreen:'folders' });\n  }\n  toggleMonthExpand(m){\n    this.setState(s=>({ expandedMonths: { ...s.expandedMonths, [m]: !s.expandedMonths[m] } }));\n  }\n  setNoteBody(newText, cursorPos){\n    const ref = this.state.editingNote;\n    if(!ref) return;\n    this.mutate(data=>{ data.notes[ref.key][ref.idx].body = newText; });\n    requestAnimationFrame(()=>{\n      if(this.noteBodyRef.current){\n        this.noteBodyRef.current.focus();\n        this.noteBodyRef.current.setSelectionRange(cursorPos, cursorPos);\n      }\n    });\n  }\n  insertNumberedList(){\n    const ta = this.noteBodyRef.current; if(!ta) return;\n    const pos = ta.selectionStart, text = ta.value;\n    const lineStart = text.lastIndexOf('\\n', pos-1)+1;\n    const insert = '1. ';\n    const newText = text.slice(0,lineStart) + insert + text.slice(lineStart);\n    this.setNoteBody(newText, lineStart+insert.length);\n  }\n  onNoteBodyKeyDown(e){\n    if(e.key!=='Enter') return;\n    const ta = e.target, pos = ta.selectionStart, text = ta.value;\n    const lineStart = text.lastIndexOf('\\n', pos-1)+1;\n    const line = text.slice(lineStart, pos);\n    const numMatch = line.match(/^(\\d+)\\.\\s(.*)$/);\n    const bulletMatch = line.match(/^-\\s(.*)$/);\n    if(numMatch){\n      e.preventDefault();\n      if(numMatch[2].trim()===''){\n        this.setNoteBody(text.slice(0,lineStart)+text.slice(pos), lineStart);\n      } else {\n        const nextNum = parseInt(numMatch[1])+1;\n        const insert = '\\n'+nextNum+'. ';\n        this.setNoteBody(text.slice(0,pos)+insert+text.slice(pos), pos+insert.length);\n      }\n      return;\n    }\n    if(bulletMatch){\n      e.preventDefault();\n      if(bulletMatch[1].trim()===''){\n        this.setNoteBody(text.slice(0,lineStart)+text.slice(pos), lineStart);\n      } else {\n        const insert = '\\n- ';\n        this.setNoteBody(text.slice(0,pos)+insert+text.slice(pos), pos+insert.length);\n      }\n      return;\n    }\n  }\n\n  createNote(folderVal){\n    const now=new Date();\n    const dateLabel = MONTH_NAMES[now.getMonth()].substring(0,3)+' '+now.getDate();\n    const key = ymKey(this.todayY, this.todayM);\n    this.mutate(data=>{\n      if(!data.notes[key]) data.notes[key]=[];\n      data.notes[key].unshift({ title:'', body:'', date: dateLabel, pinned:false, folder: folderVal });\n    });\n    this.setState(s=>({ editingNote: { key, idx: 0 }, expandedMonths: { ...s.expandedMonths, [key]: true } }));\n  }\n  goBotTodo(){ this.setState({ view:'todo' }); }\n  goBotBuy(){ this.setState({ view:'buy' }); }\n\n  occasionsForDate(m,d){\n    return (this.state.data.occasions||[]).filter(o=>o.month===m && o.day===d);\n  }\n  addOccasionAt(month, day){\n    const name = this.state.newOccName.trim();\n    if(!name) return;\n    this.mutate(data=>{\n      if(!data.occasions) data.occasions=[];\n      data.occasions.push({ name, type: this.state.newOccType, month, day });\n    });\n    this.setState({ newOccName:'', newOccType:'birthday', occAddTarget:null });\n  }\n  deleteOccasion(idx){\n    this.mutate(data=>{ data.occasions.splice(idx,1); });\n  }\n  buildOccasionBar(m, d, ctx){\n    const occs = this.occasionsForDate(m,d);\n    const badges = occs.map(o=>{\n      const globalIdx = (this.state.data.occasions||[]).indexOf(o);\n      return {\n        label: o.name+' · '+(o.type==='birthday'?'Birthday':'Anniv.'),\n        style: 'font-size:0.75rem;font-weight:600;padding:6px 10px;border-radius:20px;background:#2A2510;border:1px solid #F5C842;color:#F5C842;white-space:nowrap;flex-shrink:0;display:inline-flex;align-items:center;',\n        onDelete: ()=> this.deleteOccasion(globalIdx)\n      };\n    });\n    return {\n      badges,\n      formOpen: this.state.occAddTarget===ctx,\n      formClosed: this.state.occAddTarget!==ctx,\n      openForm: ()=> this.setState({ occAddTarget: ctx, newOccName:'', newOccType:'birthday' }),\n      addOccasion: ()=> this.addOccasionAt(m, d)\n    };\n  }\n\n  // ---- today day nav ----\n  shiftDay(delta){\n    const d = new Date(this.state.viewYear, this.state.viewMonth, this.state.viewDay + delta);\n    this.setState({ viewYear: d.getFullYear(), viewMonth: d.getMonth(), viewDay: d.getDate() });\n  }\n\n  // ---- month nav ----\n  prevMonth(){\n    let m=this.state.curMonth-1, y=this.state.curYear;\n    if(m<0){ m=11; y--; }\n    this.setState({ curMonth:m, curYear:y });\n  }\n  nextMonth(){\n    let m=this.state.curMonth+1, y=this.state.curYear;\n    if(m>11){ m=0; y++; }\n    this.setState({ curMonth:m, curYear:y });\n  }\n\n  openDayView(y,m,d){\n    this.setState({ openYear:y, openMonth:m, openDay:d, dayDTab:'tasks', prevView: this.state.view, view:'day' });\n  }\n  goBack(){ this.setState({ view: this.state.prevView || 'month' }); }\n\n  // ---- week nav ----\n  wkStart(off){\n    const now=new Date();\n    const d=new Date(now);\n    d.setDate(d.getDate()-d.getDay()+off*7);\n    return d;\n  }\n  prevWeek(){ this.setState({ weekOff: this.state.weekOff-1 }); }\n  nextWeek(){ this.setState({ weekOff: this.state.weekOff+1 }); }\n\n  addHabit(name){\n    this.mutate(data=>{ if(!data.habits) data.habits=[]; data.habits.push(name); });\n  }\n  deleteHabit(idx){\n    this.mutate(data=>{\n      data.habits.splice(idx,1);\n      Object.keys(data.habitDone||{}).forEach(key=>{\n        Object.keys(data.habitDone[key]).forEach(d=>{\n          const map = data.habitDone[key][d];\n          const nd = {};\n          Object.keys(map).forEach(k=>{ const ki=parseInt(k); if(ki<idx) nd[ki]=map[ki]; else if(ki>idx) nd[ki-1]=map[ki]; });\n          data.habitDone[key][d] = nd;\n        });\n      });\n    });\n  }\n  toggleHabit(key,d,idx){\n    this.mutate(data=>{\n      if(!data.habitDone[key]) data.habitDone[key]={};\n      if(!data.habitDone[key][d]) data.habitDone[key][d]={};\n      data.habitDone[key][d][idx] = !data.habitDone[key][d][idx];\n    });\n  }\n\n  togglePin(key, idx){\n    this.mutate(data=>{\n      if(data.notes[key] && data.notes[key][idx]) data.notes[key][idx].pinned = !data.notes[key][idx].pinned;\n    });\n  }\n\n  toggleWeekTask(key,d,idx){\n    this.mutate(dt=>{\n      if(!dt.done[key]) dt.done[key]={};\n      if(!dt.done[key][d]) dt.done[key][d]={};\n      dt.done[key][d][idx] = !dt.done[key][d][idx];\n    });\n  }\n\n  // ---- task list (shared by today + day) ----\n  buildPanel(y, m, d, ctx){\n    const key = ymKey(y,m);\n    const dt = (this.state.data.tasks[key] && this.state.data.tasks[key][d]) || [];\n    const dd = (this.state.data.done[key] && this.state.data.done[key][d]) || {};\n    const total = dt.length;\n    const doneCount = Object.values(dd).filter(Boolean).length;\n    const pct = total>0 ? Math.round((doneCount/total)*100) : 0;\n    const rows = dt.map((t,i)=>({\n      idx:i, num:i+1, text:t, done: !!dd[i],\n      textStyle: 'flex:1;border:none;background:transparent;font-size:16px;color:'+(dd[i]?'#D4A830;text-decoration:line-through;opacity:0.45':'#FFFFFF')+';outline:none;padding:2px 0;',\n      chkStyle: 'width:20px;height:20px;border-radius:5px;border:2px solid #F5C842;background:'+(dd[i]?'#F5C842':'transparent')+';cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;',\n      toggle: ()=>{\n        this.mutate(data=>{\n          if(!data.done[key]) data.done[key]={};\n          if(!data.done[key][d]) data.done[key][d]={};\n          data.done[key][d][i] = !data.done[key][d][i];\n        });\n      },\n      onTextChange: (e)=>{\n        const val = e.target.value;\n        this.mutate(data=>{ if(!data.tasks[key]) data.tasks[key]={}; if(!data.tasks[key][d]) data.tasks[key][d]=[]; data.tasks[key][d][i]=val; });\n      },\n      onDelete: ()=>{\n        this.mutate(data=>{\n          const arr = (data.tasks[key] && data.tasks[key][d]) || [];\n          const donemap = (data.done[key] && data.done[key][d]) || {};\n          arr.splice(i,1);\n          const nd={};\n          Object.keys(donemap).forEach(k=>{ const ki=parseInt(k); if(ki<i) nd[ki]=donemap[ki]; else if(ki>i) nd[ki-1]=donemap[ki]; });\n          if(!data.tasks[key]) data.tasks[key]={}; data.tasks[key][d]=arr;\n          if(!data.done[key]) data.done[key]={}; data.done[key][d]=nd;\n        });\n      }\n    }));\n    const dayNotesVal = (this.state.data.dnotes[key] && this.state.data.dnotes[key][d]) || '';\n    const habits = this.state.data.habits || [];\n    const habitDoneMap = (this.state.data.habitDone[key] && this.state.data.habitDone[key][d]) || {};\n    const habitRows = habits.map((name,i)=>({\n      idx:i, name, done: !!habitDoneMap[i],\n      chkStyle: 'width:20px;height:20px;border-radius:5px;border:2px solid #F5C842;background:'+(habitDoneMap[i]?'#F5C842':'transparent')+';cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;',\n      textStyle: 'flex:1;font-size:0.95rem;color:'+(habitDoneMap[i]?'#D4A830;text-decoration:line-through;opacity:0.45':'#FFFFFF')+';',\n      toggle: ()=> this.toggleHabit(key,d,i),\n      onDelete: ()=> this.deleteHabit(i)\n    }));\n    return {\n      ctx, activeTab: this.state[ctx+'DTab'],\n      setTab: (tab)=>{ this.setState({ [ctx+'DTab']: tab }); },\n      progressPct: pct,\n      rows,\n      addPlaceholderNum: dt.length+1,\n      onAddKeyDown: (e)=>{\n        if(e.key!=='Enter') return;\n        e.preventDefault();\n        const val = e.target.value.trim();\n        if(!val) return;\n        e.target.value='';\n        this.mutate(data=>{ if(!data.tasks[key]) data.tasks[key]={}; if(!data.tasks[key][d]) data.tasks[key][d]=[]; data.tasks[key][d].push(val); });\n      },\n      dayNotesVal,\n      onDayNotesChange: (e)=>{\n        const v=e.target.value;\n        this.mutate(data=>{ if(!data.dnotes[key]) data.dnotes[key]={}; data.dnotes[key][d]=v; });\n      },\n      habitRows, habitsEmpty: habitRows.length===0,\n      onAddHabit: (e)=>{\n        if(e.key!=='Enter') return;\n        e.preventDefault();\n
